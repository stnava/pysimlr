project:
  type: book
  output-dir: _book

execute:
  freeze: auto

book:
  title: "Deep SiMLR: Auditable Multi-Modal Integration for Biomedical Discovery"
  subtitle: "Brian B. Avants, Nicholas J. Tustison, James R. Stone"
  author: "Department of Radiology and Medical Imaging, University of Virginia"
  date: today
  chapters:
    - index.qmd
    - 01_intro_background.qmd
    - 02_methods.qmd
    - 03_experiments.qmd
    - 04_discussion.qmd
  appendices:
    - appendix_brca_clinical_validation.qmd
    - appendix_operational.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
  pdf:
    documentclass: report
    toc: true
    number-sections: true
    geometry: "margin=1in"
    keep-tex: true
