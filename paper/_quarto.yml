project:
  type: book
  output-dir: _book

execute:
  freeze: auto

title: "Deep SiMLR: Auditable Multi-Modal Integration for Biomedical Discovery"
author:
  - name: Brian B. Avants
    affiliations:
      - ref: uva
  - name: Nicholas J. Tustison
    affiliations:
      - ref: uva
  - name: James R. Stone
    affiliations:
      - ref: uva

affiliations:
  - id: uva
    name: University of Virginia
    department: Department of Radiology and Medical Imaging
    city: Charlottesville
    state: VA

book:
  date: today
  chapters:
    - index.qmd
    - 01_intro_background.qmd
    - 02_methods.qmd
    - 03_experiments.qmd
    - 04_discussion.qmd
  appendices:
    - appendix_brca_clinical_validation.qmd
    - appendix_operational.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
  pdf:
    documentclass: report
    toc: true
    number-sections: true
    geometry: margin=1in
    keep-tex: true
    mermaid-format: png
    fig-pos: H
